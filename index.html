<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>bell circuit</title>
  <style>
    body { font-family: monospace; max-width: 480px; margin: 4rem auto; padding: 0 1rem; }
    button { font-family: inherit; font-size: 1rem; padding: .4rem 1rem; cursor: pointer; border: 1px solid #000; background: #fff; }
    button:hover { background: #000; color: #fff; }
    button:disabled { opacity: .3; cursor: wait; }
    #result { margin-top: 1.5rem; white-space: pre-wrap; }
    .bar-row { display: flex; align-items: center; gap: .5rem; margin: .3rem 0; }
    .bar-label { width: 3rem; text-align: right; }
    .bar { height: 14px; background: #000; }
    .bar-value { font-size: .85rem; }
  </style>
</head>
<body>
  <h1>bell circuit</h1>
  <p>2-qubit bell state → aer simulator</p>
  <br>
  <button id="run">run</button>
  <div id="result"></div>

  <script>
    const API = localStorage.getItem("api_url") || "http://localhost:8000";
    const btn = document.getElementById("run");
    const res = document.getElementById("result");

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      res.innerHTML = "running…";
      try {
        const r = await fetch(`${API}/run-bell`, { method: "POST" });
        if (!r.ok) throw new Error(`${r.status}`);
        const data = await r.json();
        const counts = data.counts;
        const max = Math.max(...Object.values(counts));
        let html = "";
        for (const [label, val] of Object.entries(counts).sort()) {
          const w = Math.round((val / max) * 200);
          html += `<div class="bar-row">
            <span class="bar-label">${label}</span>
            <div class="bar" style="width:${w}px"></div>
            <span class="bar-value">${val}</span>
          </div>`;
        }
        res.innerHTML = html;
      } catch (e) {
        res.textContent = `error: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
