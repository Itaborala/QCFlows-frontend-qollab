<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QCFlows</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" href="static/style.css?v=graph-gates-1">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <h1>QCFlows</h1>
        <div id="status" class="status-pill">Connecting</div>
      </div>

      <section class="tool-section" data-collapsible data-collapse-key="basis">
        <h2>Basis</h2>
        <div id="basis-control" class="segmented-control" aria-label="Basis">
          <button type="button" data-basis="z" class="active">Z</button>
          <button type="button" data-basis="x">X</button>
          <button type="button" data-basis="y">Y</button>
        </div>
      </section>

      <section class="tool-section" data-collapsible data-collapse-key="metric">
        <h2>Metric</h2>
        <div id="metric-control" class="segmented-control" aria-label="Line metric">
          <button type="button" data-metric="k" class="active">K</button>
          <button type="button" data-metric="eof">EoF</button>
          <button type="button" data-metric="mi">MI</button>
        </div>
      </section>

      <section class="tool-section" data-collapsible data-collapse-key="qubits">
        <h2>Qubits</h2>
        <label class="field-label" for="qubit-count">Count</label>
        <div class="inline-fields">
          <input id="qubit-count" type="number" min="1" max="12" value="5">
          <button id="set-qubits" type="button">Set</button>
        </div>
      </section>

      <section class="tool-section" data-collapsible data-collapse-key="single-qubit">
        <h2>Single Qubit</h2>
        <div class="button-grid gate-grid">
          <button type="button" data-single-gate="H">H</button>
          <button type="button" data-single-gate="X">X</button>
          <button type="button" data-single-gate="T">T</button>
          <button type="button" data-single-gate="S">S</button>
          <button type="button" data-single-gate="Z">Z</button>
          <button type="button" data-single-gate="Y">Y</button>
        </div>
        <label class="field-label" for="rotation-angle">Angle</label>
        <input id="rotation-angle" type="number" step="any" value="1.5708">
        <div class="button-grid">
          <button type="button" data-rotation-gate="RX">RX</button>
          <button type="button" data-rotation-gate="RY">RY</button>
          <button type="button" data-rotation-gate="RZ">RZ</button>
        </div>
      </section>

      <section class="tool-section" data-collapsible data-collapse-key="two-qubit">
        <h2>Two Qubit</h2>
        <div class="button-grid">
          <button type="button" data-two-gate="CX">CX</button>
          <button type="button" data-two-gate="CZ">CZ</button>
        </div>
      </section>

      <section class="tool-section" data-collapsible data-collapse-key="circuit-actions">
        <h2>Circuit</h2>
        <div class="button-row">
          <button id="undo-gate" type="button">Undo</button>
          <button id="reset-circuit" type="button">Reset</button>
        </div>
      </section>
    </aside>

    <main class="workspace">
      <section class="panel graph-panel">
        <div class="panel-header">
          <h2>Qubit Graph</h2>
          <span id="graph-caption" class="muted">K, Z basis</span>
        </div>
        <div id="graph"></div>
      </section>

      <section class="panel" data-collapsible data-collapse-key="metric-matrix">
        <div class="panel-header">
          <h2>Metric Matrix</h2>
          <span id="matrix-caption" class="muted">K</span>
        </div>
        <canvas id="metric-matrix"></canvas>
        <div id="matrix-tooltip" class="tooltip"></div>
        <div class="stats-line">
          Mean <span id="matrix-mean">-</span>
          Max <span id="matrix-max">-</span>
          At <span id="matrix-argmax">-</span>
        </div>
      </section>

      <section class="panel" data-collapsible data-collapse-key="states">
        <div class="panel-header">
          <h2>States</h2>
          <span id="states-caption" class="muted">Amplitudes</span>
        </div>
        <div id="basis-grid"></div>
      </section>

      <section class="panel" data-collapsible data-collapse-key="statevector">
        <div class="panel-header">
          <h2>Statevector</h2>
        </div>
        <pre id="statevector">Loading...</pre>
      </section>

      <section class="panel" data-collapsible data-collapse-key="circuit">
        <div class="panel-header">
          <h2>Circuit</h2>
          <button id="load-current-qasm" type="button" class="quiet-button">QASM</button>
        </div>
        <div class="history-control circuit-history">
          <input id="history-marker" type="range" min="0" max="0" step="1" value="0" disabled>
          <div class="history-meta">
            <span id="history-label">Latest</span>
            <span id="history-count">-</span>
          </div>
        </div>
        <div id="operations-list" class="operations-list">Loading...</div>
        <div id="circuit">Loading...</div>
      </section>

      <section class="panel qasm-panel" data-collapsible data-collapse-key="import-qasm">
        <div class="panel-header">
          <h2>Import QASM</h2>
          <button id="import-qasm" type="button">Load</button>
        </div>
        <textarea id="qasm-input" spellcheck="false">OPENQASM 2.0;
include "qelib1.inc";
qreg q[5];
h q[0];
cx q[0],q[1];</textarea>
      </section>
    </main>
  </div>

  <script type="module" src="static/main.js?v=graph-gates-1"></script>
</body>
</html>
